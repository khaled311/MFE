name: deploy-auth

on:
  push:
    branches: ["main"] # only trigger when main branch is pushed
    paths:
      - "packages/auth/**" # only trigger when auth package is changed

defaults: # set default working directory for all jobs§
  run:
    working-directory: packages/auth # all jobs will run in this directory

jobs:
  build:
    runs-on: ubuntu-latest # run on ubuntu-latest
    steps: # list of steps to run
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: packages/auth/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build auth
        run: pnpm run build
        env:
          PRODUCTION_DOMAIN: ${{secrets.PRODUCTION_DOMAIN}}

      - name: Configure AWS Credentials 2
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{secrets.AWS_REGION}}
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}

      - name: Deploy container
        run: aws s3 sync dist s3://${{ secrets.AWS_BUCKET_NAME }}/auth/latest # deploy to s3 bucket

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} --paths "/auth/latest/*"
