name: deploy-container

on:
  push:
    branches: ["main"] # only trigger when main branch is pushed
    paths:
      - "packages/container/**" # only trigger when container package is changed

defaults: # set default working directory for all jobs
  run:
    working-directory: packages/container # all jobs will run in this directory

jobs:
  build:
    runs-on: ubuntu-latest # run on ubuntu-latest
    steps: # list of steps to run
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build container
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy container
        run: aws s3 sync dist s3://${{ secrets.AWS_BUCKET_NAME }}/container/latest
